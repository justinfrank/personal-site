<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>justinfrank.me — Justin Frank Web Designer/Developer</title>
  <meta name="description" content="Justin Frank is a Designer and Developer in the Dallas/Fort Worth Area.">

  <!-- Favicons -->
  <link rel="icon" href="/favicon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preload" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&display=swap" as="style" onload="this.onload=null;this.rel='stylesheet'">
  <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;600&display=swap"></noscript>

  <script>
    (function () {
      try {
        var t = localStorage.getItem('theme');
        if (t === 'dark' || t === 'light') {
          document.documentElement.setAttribute('data-theme', t);
        } else if (window.matchMedia('(prefers-color-scheme: dark)').matches) {
          t = 'dark';
          document.documentElement.setAttribute('data-theme', 'dark');
        }
        if (t) document.cookie = 'theme=' + t + '; path=/; max-age=31536000; SameSite=Lax';
      } catch (e) {}
    })();
  </script>
  %sveltekit.head%
</head>
<body data-sveltekit-preload-data="hover">
  <div>%sveltekit.body%</div>
  <svg class="noise-overlay" xmlns="http://www.w3.org/2000/svg" width="100%" height="100%" preserveAspectRatio="none">
    <filter id="noise-z22xr1g29gf" x="0%" y="0%" width="100%" height="100%">
      <feTurbulence type="turbulence" baseFrequency="1.15" numOctaves="1" seed="2" stitchTiles="stitch">
        <animate attributeName="seed" from="0" to="100" dur="2.6666666666666665s" repeatCount="indefinite"></animate>
      </feTurbulence>
    </filter>
    <rect width="100%" height="100%" filter="url(#noise-z22xr1g29gf)"></rect>
  </svg>
</body>
</html>

<style>
  .noise-overlay {
    position: absolute;
    inset: 0;
    width: 100%;

  }
</style>
